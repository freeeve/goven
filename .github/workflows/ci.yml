name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt -s
        if: runner.os != 'Windows'
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then echo "not gofmt -s clean:"; echo "$out"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: tests (race)
        run: go test -race -count=1 ./...
